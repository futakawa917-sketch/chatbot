<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会話ログ監査 | 補助金HACK</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }
  .header {
    background: #1e293b;
    border-bottom: 1px solid #334155;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-title span { color: #60a5fa; }
  .nav { display: flex; gap: 8px; }
  .nav-btn {
    background: #334155; border: none; border-radius: 8px;
    padding: 8px 16px; color: #94a3b8; font-size: 13px;
    text-decoration: none; cursor: pointer; font-family: inherit;
  }
  .nav-btn:hover { background: #475569; color: #e2e8f0; }
  .nav-btn.active { background: #2563eb; color: #fff; }

  .stats {
    display: flex; gap: 16px; padding: 20px 24px; flex-wrap: wrap;
  }
  .stat-card {
    background: #1e293b; border: 1px solid #334155; border-radius: 12px;
    padding: 12px 18px; min-width: 140px;
  }
  .stat-label { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
  .stat-value { font-size: 22px; font-weight: 800; color: #60a5fa; }

  .filters {
    display: flex; gap: 12px; padding: 0 24px 16px; flex-wrap: wrap;
  }
  .input, .select {
    background: #1e293b; border: 1px solid #334155;
    border-radius: 8px; padding: 10px 14px;
    color: #e2e8f0; font-size: 13px; font-family: inherit;
  }
  .input { width: 280px; }
  .input:focus, .select:focus { outline: none; border-color: #60a5fa; }

  .conv-list {
    padding: 0 24px 24px;
  }
  .conv-item {
    background: #1e293b; border: 1px solid #334155;
    border-radius: 12px; padding: 16px 20px; margin-bottom: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .conv-item:hover { border-color: #60a5fa; }
  .conv-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .conv-title {
    font-size: 14px; font-weight: 700; color: #f1f5f9;
  }
  .conv-meta {
    font-size: 11px; color: #64748b;
  }
  .conv-summary {
    font-size: 12px; color: #94a3b8;
    display: flex; gap: 16px; flex-wrap: wrap;
  }
  .conv-tag {
    background: #0f172a; padding: 2px 8px; border-radius: 6px;
    font-size: 10px;
  }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    justify-content: center; align-items: center; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #1e293b; border: 1px solid #334155; border-radius: 16px;
    width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto;
    padding: 24px;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close {
    background: none; border: none; color: #94a3b8;
    font-size: 24px; cursor: pointer;
  }

  .chat-log {
    background: #0f172a; border-radius: 10px; padding: 16px;
    max-height: 500px; overflow-y: auto;
  }
  .chat-msg {
    margin-bottom: 12px; padding: 10px 14px; border-radius: 10px;
    font-size: 13px; line-height: 1.6;
  }
  .chat-user {
    background: #1e3a8a; color: #bfdbfe; margin-left: 40px;
  }
  .chat-bot {
    background: #1e293b; color: #cbd5e1; margin-right: 40px;
  }
  .chat-role {
    font-size: 10px; font-weight: 700; opacity: 0.7;
    margin-bottom: 4px;
  }

  .empty {
    text-align: center; padding: 60px; color: #64748b;
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-title"><span>会話ログ</span> 監査画面</div>
  <div class="nav">
    <a href="/dashboard.html" class="nav-btn">ダッシュボード</a>
    <a href="/sales.html" class="nav-btn">営業パイプライン</a>
    <a href="/logs.html" class="nav-btn active">会話ログ</a>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="filters">
  <input type="text" class="input" id="searchInput" placeholder="メッセージ内容で検索...">
  <select class="select" id="dateFilter">
    <option value="">全期間</option>
    <option value="today">今日</option>
    <option value="week">今週</option>
    <option value="month">今月</option>
  </select>
  <select class="select" id="completedFilter">
    <option value="">全件</option>
    <option value="completed">診断完了のみ</option>
    <option value="incomplete">診断未完了のみ</option>
  </select>
</div>

<div class="conv-list" id="convList"><div class="empty">読み込み中...</div></div>

<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const SUPABASE_URL = 'https://zypsanfwkbwpuwchjqfn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5cHNhbmZ3a2J3cHV3Y2hqcWZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyOTkyNzgsImV4cCI6MjA5MDg3NTI3OH0.tzZUBOMurHMcttSaTYQu4BzOVxOnxTfrB9aqigFwShI';

let allData = [];

function escapeHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function loadData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/line_conversations?select=*&order=updated_at.desc&limit=500`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
    });
    allData = await res.json();
    if (!Array.isArray(allData)) allData = [];
    renderStats();
    render();
  } catch (e) {
    document.getElementById('convList').innerHTML = '<div class="empty">読み込み失敗</div>';
  }
}

function renderStats() {
  const total = allData.length;
  const completed = allData.filter(d => d.diagnosis_completed_at).length;
  const totalMessages = allData.reduce((s, d) => s + (d.messages?.length || 0), 0);
  const completionRate = total > 0 ? Math.round(completed / total * 100) : 0;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">総会話数</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">診断完了</div><div class="stat-value">${completed}</div></div>
    <div class="stat-card"><div class="stat-label">完了率</div><div class="stat-value">${completionRate}%</div></div>
    <div class="stat-card"><div class="stat-label">総メッセージ</div><div class="stat-value">${totalMessages}</div></div>
  `;
}

function getFiltered() {
  let data = [...allData];
  const search = document.getElementById('searchInput').value.toLowerCase();
  const date = document.getElementById('dateFilter').value;
  const completed = document.getElementById('completedFilter').value;

  if (search) {
    data = data.filter(d => {
      const text = (d.line_display_name || '') + ' ' + JSON.stringify(d.messages || []);
      return text.toLowerCase().includes(search);
    });
  }
  if (date) {
    const now = new Date(); const start = new Date();
    if (date === 'today') start.setHours(0,0,0,0);
    else if (date === 'week') start.setDate(now.getDate() - 7);
    else if (date === 'month') start.setMonth(now.getMonth() - 1);
    data = data.filter(d => new Date(d.updated_at) >= start);
  }
  if (completed === 'completed') data = data.filter(d => d.diagnosis_completed_at);
  if (completed === 'incomplete') data = data.filter(d => !d.diagnosis_completed_at);
  return data;
}

function render() {
  const data = getFiltered();
  if (data.length === 0) {
    document.getElementById('convList').innerHTML = '<div class="empty">該当する会話はありません</div>';
    return;
  }
  document.getElementById('convList').innerHTML = data.map((d, i) => {
    const msgCount = d.messages?.length || 0;
    const lastMsg = d.messages?.[d.messages.length - 1]?.content?.substring(0, 50) || '';
    const updatedDate = new Date(d.updated_at).toLocaleString('ja-JP');
    return `
      <div class="conv-item" onclick="showDetail(${i})">
        <div class="conv-header">
          <div class="conv-title">${escapeHtml(d.line_display_name) || '名前不明'}</div>
          <div class="conv-meta">${updatedDate}</div>
        </div>
        <div class="conv-summary">
          <span class="conv-tag">${msgCount}件のメッセージ</span>
          ${d.mode ? `<span class="conv-tag">${escapeHtml(d.mode)}</span>` : ''}
          ${d.diagnosis_completed_at ? '<span class="conv-tag" style="color:#34d399;">診断完了</span>' : '<span class="conv-tag" style="color:#fbbf24;">診断中</span>'}
          <span style="opacity:0.6;">${escapeHtml(lastMsg)}...</span>
        </div>
      </div>`;
  }).join('');
}

function showDetail(i) {
  const d = getFiltered()[i];
  if (!d) return;
  const messages = d.messages || [];
  const html = `
    <div class="modal-header">
      <div class="modal-title">${escapeHtml(d.line_display_name) || '名前不明'} の会話</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div style="font-size:12px;color:#94a3b8;margin-bottom:12px;">
      User ID: ${escapeHtml(d.line_user_id)}<br>
      モード: ${escapeHtml(d.mode) || '-'} | 開始: ${new Date(d.created_at).toLocaleString('ja-JP')} | 更新: ${new Date(d.updated_at).toLocaleString('ja-JP')}
    </div>
    <div class="chat-log">
      ${messages.map(m => {
        const isUser = m.role === 'user';
        const text = m.content.replace(/---SIMULATION_START---[\s\S]*?---SIMULATION_END---/g, '[シミュレーション結果]');
        return `<div class="chat-msg ${isUser ? 'chat-user' : 'chat-bot'}">
          <div class="chat-role">${isUser ? 'ユーザー' : 'ボット'}</div>
          ${escapeHtml(text).replace(/\n/g, '<br>')}
        </div>`;
      }).join('')}
    </div>
  `;
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('active');
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }
document.getElementById('modal').addEventListener('click', (e) => { if (e.target.id === 'modal') closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('dateFilter').addEventListener('change', render);
document.getElementById('completedFilter').addEventListener('change', render);

loadData();
</script>
</body>
</html>
