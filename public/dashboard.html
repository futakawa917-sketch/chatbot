<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>補助金診断 - 営業ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }

  .header {
    background: #1e293b;
    border-bottom: 1px solid #334155;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-title span { color: #60a5fa; }

  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 20px 24px;
    overflow-x: auto;
  }
  .stat-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 16px 20px;
    min-width: 160px;
    flex-shrink: 0;
  }
  .stat-label { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
  .stat-value { font-size: 28px; font-weight: 700; }
  .stat-value.blue { color: #60a5fa; }
  .stat-value.green { color: #34d399; }
  .stat-value.yellow { color: #fbbf24; }
  .stat-value.purple { color: #a78bfa; }

  .controls {
    padding: 0 24px 16px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-input {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 10px 16px;
    color: #e2e8f0;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    width: 280px;
    transition: border-color 0.2s;
  }
  .search-input:focus { outline: none; border-color: #60a5fa; }
  .search-input::placeholder { color: #64748b; }

  .filter-select {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 10px 16px;
    color: #e2e8f0;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }
  .filter-select:focus { outline: none; border-color: #60a5fa; }

  .refresh-btn {
    background: #2563eb;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }
  .refresh-btn:hover { background: #1d4ed8; }

  .table-container {
    padding: 0 24px 24px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 900px;
  }
  thead th {
    background: #1e293b;
    padding: 12px 14px;
    text-align: left;
    font-size: 12px;
    font-weight: 500;
    color: #94a3b8;
    border-bottom: 1px solid #334155;
    position: sticky;
    top: 57px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: #e2e8f0; }
  tbody tr {
    border-bottom: 1px solid #1e293b;
    cursor: pointer;
    transition: background 0.15s;
  }
  tbody tr:hover { background: #1e293b; }
  tbody td {
    padding: 12px 14px;
    font-size: 13px;
    color: #cbd5e1;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge-simple { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .badge-detail { background: rgba(139,92,246,0.15); color: #a78bfa; }
  .badge-zoom-yes { background: rgba(52,211,153,0.15); color: #34d399; }
  .badge-zoom-no { background: rgba(148,163,184,0.1); color: #64748b; }
  .badge-status { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; }
  .badge-診断完了 { background: rgba(148,163,184,0.15); color: #94a3b8; }
  .badge-Zoom予約済 { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .badge-Zoom実施済 { background: rgba(139,92,246,0.15); color: #a78bfa; }
  .badge-契約 { background: rgba(52,211,153,0.15); color: #34d399; }
  .badge-検討中 { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .badge-失注 { background: rgba(239,68,68,0.15); color: #f87171; }

  .status-select {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 6px;
    padding: 6px 10px;
    color: #e2e8f0;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }
  .status-select:focus { outline: none; border-color: #60a5fa; }

  .note-input {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 8px 12px;
    color: #e2e8f0;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    width: 100%;
    resize: vertical;
    min-height: 60px;
    margin-top: 8px;
  }
  .note-input:focus { outline: none; border-color: #60a5fa; }
  .save-note-btn {
    background: #2563eb;
    border: none;
    border-radius: 6px;
    padding: 6px 16px;
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    margin-top: 6px;
  }
  .save-note-btn:hover { background: #1d4ed8; }

  .amount { color: #34d399; font-weight: 700; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    width: 100%;
    max-width: 700px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close {
    background: none; border: none; color: #94a3b8;
    font-size: 24px; cursor: pointer;
  }
  .modal-close:hover { color: #fff; }

  .detail-section {
    background: #0f172a;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .detail-section-title {
    font-size: 12px;
    font-weight: 700;
    color: #60a5fa;
    margin-bottom: 10px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
  }
  .detail-label { color: #94a3b8; }
  .detail-value { color: #e2e8f0; font-weight: 500; }

  .sim-result-item {
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
  }
  .sim-result-name { font-size: 14px; font-weight: 700; color: #60a5fa; margin-bottom: 4px; }
  .sim-result-amount { font-size: 20px; font-weight: 700; color: #34d399; }
  .sim-result-detail { font-size: 12px; color: #94a3b8; margin-top: 4px; }

  .chat-log {
    max-height: 300px;
    overflow-y: auto;
    padding: 12px;
    background: #0f172a;
    border-radius: 10px;
  }
  .chat-msg {
    margin-bottom: 8px;
    font-size: 12px;
    line-height: 1.6;
  }
  .chat-msg-user { color: #60a5fa; }
  .chat-msg-bot { color: #94a3b8; }
  .chat-role {
    font-weight: 700;
    font-size: 11px;
    display: inline-block;
    margin-right: 4px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #64748b;
  }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state-text { font-size: 16px; }

  .loading { text-align: center; padding: 40px; color: #64748b; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title"><span>補助金診断</span> 営業ダッシュボード</div>
  <div style="display:flex;gap:8px;">
    <a href="/sales.html" style="background:#a78bfa;border:none;border-radius:8px;padding:10px 20px;color:#fff;font-size:14px;font-weight:500;font-family:'Noto Sans JP',sans-serif;cursor:pointer;text-decoration:none;transition:background 0.2s;">営業パイプライン</a>
    <button class="refresh-btn" onclick="loadData()">更新</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="controls">
  <input type="text" class="search-input" id="searchInput" placeholder="会社名・事業内容で検索...">
  <select class="filter-select" id="filterMode">
    <option value="">全モード</option>
    <option value="簡易">簡易診断</option>
    <option value="詳細">詳細診断</option>
  </select>
  <select class="filter-select" id="filterDate">
    <option value="">全期間</option>
    <option value="today">今日</option>
    <option value="week">今週</option>
    <option value="month">今月</option>
  </select>
  <select class="filter-select" id="filterStatus">
    <option value="">全ステータス</option>
    <option value="診断完了">診断完了</option>
    <option value="Zoom予約済">Zoom予約済</option>
    <option value="Zoom実施済">Zoom実施済</option>
    <option value="契約">契約</option>
    <option value="検討中">検討中</option>
    <option value="失注">失注</option>
  </select>
  <select class="filter-select" id="sortOrder">
    <option value="newest">新しい順</option>
    <option value="oldest">古い順</option>
    <option value="amount">受給額が高い順</option>
  </select>
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>日時</th>
        <th>モード</th>
        <th>会社名</th>
        <th>代表者</th>
        <th>業種</th>
        <th>所在地</th>
        <th>従業員</th>
        <th>診断結果</th>
        <th>合計受給額</th>
        <th>ステータス</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="10" class="loading">読み込み中...</td></tr>
    </tbody>
  </table>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const SUPABASE_URL = 'https://zypsanfwkbwpuwchjqfn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5cHNhbmZ3a2J3cHV3Y2hqcWZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyOTkyNzgsImV4cCI6MjA5MDg3NTI3OH0.tzZUBOMurHMcttSaTYQu4BzOVxOnxTfrB9aqigFwShI';

let allData = [];

async function loadData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/conversation_logs?select=*&order=created_at.desc`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      },
    });
    allData = await res.json();
    renderStats();
    renderTable();
  } catch (e) {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="9" class="loading">データの読み込みに失敗しました</td></tr>';
  }
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function getFilteredData() {
  let data = [...allData];
  const search = document.getElementById('searchInput').value.toLowerCase();
  const mode = document.getElementById('filterMode').value;
  const dateFilter = document.getElementById('filterDate').value;
  const sort = document.getElementById('sortOrder').value;

  if (search) {
    data = data.filter(d =>
      (d.company_name || '').toLowerCase().includes(search) ||
      (d.business_content || '').toLowerCase().includes(search) ||
      (d.representative || '').toLowerCase().includes(search) ||
      (d.location || '').toLowerCase().includes(search)
    );
  }

  if (mode) {
    data = data.filter(d => (d.mode || '').includes(mode));
  }

  const status = document.getElementById('filterStatus').value;
  if (status) {
    data = data.filter(d => (d.status || '診断完了') === status);
  }

  if (dateFilter) {
    const now = new Date();
    const start = new Date();
    if (dateFilter === 'today') start.setHours(0,0,0,0);
    else if (dateFilter === 'week') start.setDate(now.getDate() - 7);
    else if (dateFilter === 'month') start.setMonth(now.getMonth() - 1);
    data = data.filter(d => new Date(d.created_at) >= start);
  }

  if (sort === 'oldest') {
    data.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  } else if (sort === 'amount') {
    data.sort((a,b) => {
      const aAmt = parseInt(a.simulation_results?.totalEstimated) || 0;
      const bAmt = parseInt(b.simulation_results?.totalEstimated) || 0;
      return bAmt - aAmt;
    });
  } else {
    data.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  }

  return data;
}

function getSubsidyNames(simResults) {
  if (!simResults || !simResults.results) return '-';
  return simResults.results.map(r => r.name).join(', ');
}

function getTotalAmount(simResults) {
  if (!simResults) return 0;
  return parseInt(simResults.totalEstimated) || 0;
}

function renderStats() {
  const total = allData.length;
  const zoomBooked = allData.filter(d => d.status === 'Zoom予約済' || d.status === 'Zoom実施済' || d.status === '契約').length;
  const contracted = allData.filter(d => d.status === '契約').length;
  const pending = allData.filter(d => d.status === '検討中').length;
  const totalAmount = allData.reduce((sum, d) => sum + getTotalAmount(d.simulation_results), 0);
  const contractedAmount = allData.filter(d => d.status === '契約').reduce((sum, d) => sum + getTotalAmount(d.simulation_results), 0);

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">総診断数</div>
      <div class="stat-value blue">${total}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Zoom予約以上</div>
      <div class="stat-value purple">${zoomBooked}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">契約数</div>
      <div class="stat-value green">${contracted}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">検討中</div>
      <div class="stat-value yellow">${pending}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">合計想定受給額</div>
      <div class="stat-value blue">${totalAmount.toLocaleString()}万</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">契約済み受給額</div>
      <div class="stat-value green">${contractedAmount.toLocaleString()}万</div>
    </div>
  `;
}

function renderTable() {
  const data = getFilteredData();
  const tbody = document.getElementById('tableBody');

  if (data.length === 0) {
    tbody.innerHTML = `
      <tr><td colspan="10">
        <div class="empty-state">
          <div class="empty-state-icon">📋</div>
          <div class="empty-state-text">データがありません</div>
        </div>
      </td></tr>`;
    return;
  }

  tbody.innerHTML = data.map((d, i) => {
    const totalAmt = getTotalAmount(d.simulation_results);
    const subsidies = getSubsidyNames(d.simulation_results);
    const empTotal = [d.employees_full, d.employees_part].filter(Boolean).join(' / ');

    const st = d.status || '診断完了';
    return `
      <tr onclick="showDetail(${i})" data-index="${i}">
        <td>${formatDate(d.created_at)}</td>
        <td><span class="badge ${d.mode === '詳細' ? 'badge-detail' : 'badge-simple'}">${escapeHtml(d.mode) || '-'}</span></td>
        <td>${escapeHtml(d.company_name) || '-'}</td>
        <td>${escapeHtml(d.representative) || '-'}</td>
        <td>${escapeHtml(d.business_content || d.business_type) || '-'}</td>
        <td>${escapeHtml(d.location) || '-'}</td>
        <td>${escapeHtml(empTotal) || '-'}</td>
        <td style="max-width:250px;">${escapeHtml(subsidies)}</td>
        <td class="amount">${totalAmt > 0 ? totalAmt + '万円' : '-'}</td>
        <td><span class="badge badge-status badge-${st}">${st}</span></td>
      </tr>`;
  }).join('');
}

function showDetail(index) {
  const data = getFilteredData();
  const d = data[index];
  if (!d) return;

  const sim = d.simulation_results;
  let simHtml = '<div style="color:#64748b;">シミュレーション未完了</div>';
  if (sim && sim.results) {
    simHtml = sim.results.map(r => `
      <div class="sim-result-item">
        <div class="sim-result-name">${escapeHtml(r.name)} ${r.matchLevel ? '<span style="font-size:11px;color:#94a3b8;">'+escapeHtml(r.matchLevel)+'</span>' : ''}</div>
        <div class="sim-result-amount">約${r.estimatedAmount || '?'}万円 <span style="font-size:12px;color:#94a3b8;">(補助率: ${escapeHtml(r.rate || '')})</span></div>
        ${r.reason ? '<div class="sim-result-detail">'+escapeHtml(r.reason)+'</div>' : ''}
        ${r.howToQualify ? '<div class="sim-result-detail" style="color:#60a5fa;">条件: '+escapeHtml(r.howToQualify)+'</div>' : ''}
        ${r.cautions ? '<div class="sim-result-detail" style="color:#f87171;">注意: '+escapeHtml(r.cautions)+'</div>' : ''}
      </div>
    `).join('');
    if (sim.totalEstimated) {
      simHtml += `<div style="text-align:right;font-size:16px;font-weight:700;color:#34d399;margin-top:8px;">合計: 約${sim.totalEstimated}万円</div>`;
    }
  }

  let chatHtml = '<div style="color:#64748b;">会話ログなし</div>';
  if (d.full_conversation && d.full_conversation.length > 0) {
    chatHtml = d.full_conversation.map(m => {
      const isUser = m.role === 'user';
      let text = m.content.replace(/---SIMULATION_START---[\s\S]*?---SIMULATION_END---/g, '[シミュレーション結果]');
      return `<div class="chat-msg ${isUser ? 'chat-msg-user' : 'chat-msg-bot'}">
        <span class="chat-role">${isUser ? 'ユーザー' : 'ボット'}:</span>
        ${escapeHtml(text)}
      </div>`;
    }).join('');
  }

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${escapeHtml(d.company_name) || '不明'}</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">基本情報</div>
      <div class="detail-row"><span class="detail-label">会社名</span><span class="detail-value">${escapeHtml(d.company_name) || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">代表者</span><span class="detail-value">${escapeHtml(d.representative) || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">法人/個人</span><span class="detail-value">${escapeHtml(d.entity_type) || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">設立</span><span class="detail-value">${escapeHtml(d.established) || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">所在地</span><span class="detail-value">${escapeHtml(d.location) || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">正社員</span><span class="detail-value">${escapeHtml(d.employees_full) || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">アルバイト</span><span class="detail-value">${escapeHtml(d.employees_part) || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">インボイス</span><span class="detail-value">${escapeHtml(d.invoice_registered) || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">補助金経験</span><span class="detail-value">${escapeHtml(d.subsidy_experience) || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">事業内容</span><span class="detail-value">${escapeHtml(d.business_content) || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">やりたいこと</span><span class="detail-value">${escapeHtml(d.desired_use) || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">診断モード</span><span class="detail-value">${escapeHtml(d.mode) || '-'}</span></div>
      <div class="detail-row"><span class="detail-label">診断日時</span><span class="detail-value">${d.created_at ? new Date(d.created_at).toLocaleString('ja-JP') : '-'}</span></div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">進捗ステータス</div>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <select class="status-select" id="modalStatusSelect" onchange="updateStatus('${d.id}', this.value)">
          <option value="診断完了" ${(d.status||'診断完了')==='診断完了'?'selected':''}>診断完了</option>
          <option value="Zoom予約済" ${d.status==='Zoom予約済'?'selected':''}>Zoom予約済</option>
          <option value="Zoom実施済" ${d.status==='Zoom実施済'?'selected':''}>Zoom実施済</option>
          <option value="契約" ${d.status==='契約'?'selected':''}>契約</option>
          <option value="検討中" ${d.status==='検討中'?'selected':''}>検討中</option>
          <option value="失注" ${d.status==='失注'?'selected':''}>失注</option>
        </select>
        <span id="statusSaved" style="font-size:12px;color:#34d399;display:none;">保存しました</span>
      </div>
      <textarea class="note-input" id="modalNote" placeholder="営業メモ（Zoomの日時、話した内容、次のアクションなど）">${escapeHtml(d.status_note || '')}</textarea>
      <button class="save-note-btn" onclick="saveNote('${d.id}')">メモを保存</button>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">シミュレーション結果</div>
      ${simHtml}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">会話ログ</div>
      <div class="chat-log">${chatHtml}</div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

async function updateStatus(id, status) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/conversation_logs?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({ status, updated_at: new Date().toISOString() }),
    });
    const item = allData.find(d => d.id === id);
    if (item) item.status = status;
    renderStats();
    renderTable();
    const el = document.getElementById('statusSaved');
    if (el) { el.style.display = 'inline'; setTimeout(() => el.style.display = 'none', 2000); }
  } catch (e) {}
}

async function saveNote(id) {
  const note = document.getElementById('modalNote').value;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/conversation_logs?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({ status_note: note, updated_at: new Date().toISOString() }),
    });
    const item = allData.find(d => d.id === id);
    if (item) item.status_note = note;
    const el = document.getElementById('statusSaved');
    if (el) { el.textContent = 'メモ保存しました'; el.style.display = 'inline'; setTimeout(() => { el.style.display = 'none'; el.textContent = '保存しました'; }, 2000); }
  } catch (e) {}
}

document.getElementById('searchInput').addEventListener('input', renderTable);
document.getElementById('filterMode').addEventListener('change', renderTable);
document.getElementById('filterDate').addEventListener('change', renderTable);
document.getElementById('filterStatus').addEventListener('change', renderTable);
document.getElementById('sortOrder').addEventListener('change', renderTable);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

loadData();
</script>

</body>
</html>
