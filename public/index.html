<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>補助金診断 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
  }
  .container {
    text-align: center;
    max-width: 480px;
  }
  h1 {
    font-size: 24px;
    margin-bottom: 8px;
    color: #60a5fa;
  }
  p {
    color: #94a3b8;
    margin-bottom: 32px;
    font-size: 14px;
  }
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .btn {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 18px 24px;
    color: #e2e8f0;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    transition: all 0.2s;
    display: block;
  }
  .btn:hover {
    background: #2563eb;
    border-color: #2563eb;
    transform: translateY(-2px);
  }
  .btn-sub {
    font-size: 12px;
    font-weight: 400;
    color: #64748b;
    margin-top: 4px;
  }
  .btn:hover .btn-sub {
    color: #bfdbfe;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>補助金診断 管理画面</h1>
    <p>ご利用の画面を選択してください</p>
    <div class="btn-group">
      <a href="/dashboard.html" class="btn">
        診断ダッシュボード
        <div class="btn-sub">全クライアントの一覧・検索・絞り込み</div>
      </a>
      <a href="/sales.html" class="btn">
        営業パイプライン
        <div class="btn-sub">Zoom予約以降の案件をカンバンで管理</div>
      </a>
    </div>
  </div>
</body>
</html>
