name: Generate Sales Tasks

on:
  schedule:
    # 毎朝 JST 7:00 (UTC 22:00 前日)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Generate tasks
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 60 \
            https://chatbot-tau-five-39.vercel.app/api/cron/generate-tasks
