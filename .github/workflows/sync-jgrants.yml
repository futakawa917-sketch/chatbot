name: Sync Jグランツ

on:
  schedule:
    # 毎日朝6時（JST 15時）に実行
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call Jグランツ sync endpoint
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 600 \
            https://chatbot-tau-five-39.vercel.app/api/cron/sync-jgrants
